{{- /* Override Docsy's default Twitter card (which is "summary") with a
       large-image card using the ajq banner. Single source for twitter:* tags. */ -}}
{{- $img := "images/brand/ajq-banner.png" -}}
{{- with .Params.images }}{{ $img = index . 0 }}{{ end -}}
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}">
<meta name="twitter:description" content="{{ partial "page-description.html" . }}">
<meta name="twitter:image" content="{{ $img | absURL }}">
