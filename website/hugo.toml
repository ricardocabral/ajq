# ajq documentation & marketing site, built with Hugo + Docsy
# Built and deployed by GitHub Actions to GitHub Pages.

baseURL = "https://ricardocabral.github.io/ajq/"
title = "ajq"

# Language
locale = "en-us"
contentDir = "content/en"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableGitInfo = true
disableKinds = ["taxonomy", "term"]

# Docsy needs raw HTML in Markdown for its shortcodes.
[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "tango"
    lineNos = false
    noClasses = false

# Image processing defaults (Docsy cover/section images).
[imaging]
  resampleFilter = "CatmullRom"
  quality = 75
  anchor = "smart"

[services]
  [services.googleAnalytics]
    id = ""

# ---------------------------------------------------------------------------
# Hugo modules: Docsy (which transitively imports Bootstrap + Font-Awesome).
# ---------------------------------------------------------------------------
[module]
  proxy = "direct"
  [module.hugoVersion]
    extended = true
    min = "0.146.0"
  [[module.imports]]
    path = "github.com/google/docsy"

# ---------------------------------------------------------------------------
# Output formats: HTML + Docsy print. Offline search is handled by Docsy as a
# resource (params.offlineSearch), not as a dedicated output format.
# ---------------------------------------------------------------------------
[outputs]
  home = ["HTML", "RSS", "print"]
  section = ["HTML", "RSS", "print"]

# ---------------------------------------------------------------------------
# Docsy params
# ---------------------------------------------------------------------------
[params]
  copyright = "The ajq Authors"
  privacy_policy = ""
  archived_version = false
  version = "v0.1"
  url_latest_version = "https://ricardocabral.github.io/ajq/"

  github_repo = "https://github.com/ricardocabral/ajq"
  github_project_repo = "https://github.com/ricardocabral/ajq"
  github_branch = "main"
  # Docs live under website/content, so this makes "edit this page" links resolve.
  github_subdir = "website"

  # Tagline shown in the browser tab suffix / SEO.
  description = "Semantic jq for messy JSON streams. ajq adds fuzzy JSON filtering, semantic grep for JSON/NDJSON, and bounded classification while pure jq stays deterministic."

  offlineSearch = true
  offlineSearchSummaryLength = 200
  offlineSearchMaxResults = 25

  prism_syntax_highlighting = false

  [params.taxonomy]
    taxonomyCloud = []
    taxonomyPageHeader = []

  [params.ui]
    breadcrumb_disable = false
    navbar_logo = true
    navbar_translucent_over_cover_disable = false
    sidebar_menu_compact = false
    sidebar_menu_foldable = true
    sidebar_search_disable = false
    footer_about_enable = true
    ul_show = 1

    [params.ui.feedback]
      enable = true
      yes = 'Glad to hear it! Please <a href="https://github.com/ricardocabral/ajq/issues/new">tell us how we can improve</a>.'
      no = 'Sorry to hear that. Please <a href="https://github.com/ricardocabral/ajq/issues/new">tell us how we can improve</a>.'

    [params.ui.readingtime]
      enable = false

  [params.links]
    [[params.links.user]]
      name = "GitHub"
      url = "https://github.com/ricardocabral/ajq"
      icon = "fab fa-github"
      desc = "Source, issues, and releases on GitHub"

# ---------------------------------------------------------------------------
# Top navigation
# ---------------------------------------------------------------------------
# "Docs" is contributed by content/en/docs/_index.md front matter.
[[menu.main]]
  name = "GitHub"
  weight = 50
  url = "https://github.com/ricardocabral/ajq"
  pre = "<i class='fab fa-github'></i>"

[languages]
  [languages.en]
    label = "English"
    weight = 1
    [languages.en.params]
      title = "ajq"
      description = "Semantic jq for messy JSON streams. ajq adds fuzzy JSON filtering, semantic grep for JSON/NDJSON, and bounded classification while pure jq stays deterministic."
