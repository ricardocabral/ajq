name: Release

"on":
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - .goreleaser.yaml
      - build/windows/ajq.wxs
      - .github/workflows/ci.yml
      - .github/workflows/release.yml
      - .github/workflows/winget.yml
      - .github/workflows/package-manager-smoke.yml
      - Makefile
      - scripts/install.sh
      - scripts/install_test.sh
      - scripts/release_smoke.sh
      - scripts/release_publish_preflight.sh
      - scripts/release_publish_preflight_test.sh
      - scripts/release_workflow_test.sh
      - scripts/windows_msi_contract.ps1
      - scripts/windows_msi_contract_test.ps1
      - scripts/package_manager_smoke.sh
      - scripts/package_manager_smoke_test.sh
      - scripts/package_manager_smoke.ps1
      - scripts/package_manager_smoke_test.ps1
      - scripts/winget_release_preflight.ps1
      - scripts/winget_release_preflight_test.ps1
      - go.mod
      - go.sum
      - cmd/ajq/**
      - internal/version/**
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate release identity
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.identity.outputs.ref }}
      tag: ${{ steps.identity.outputs.tag }}
      version: ${{ steps.identity.outputs.version }}
    steps:
      - name: Check out triggering revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Validate canonical release tag
        id: identity
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF: ${{ github.ref }}
          EVENT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == pull_request ]]; then
            printf 'ref=%s\n' "$EVENT_SHA" >> "$GITHUB_OUTPUT"
            printf 'tag=\nversion=\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == push ]]; then
            [[ "$EVENT_REF" =~ ^refs/tags/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]] || {
              printf 'release publish requires a vX.Y.Z tag, got %s\n' "$EVENT_REF" >&2
              exit 1
            }
            tag="${BASH_REMATCH[1]}"
            git fetch --force origin "refs/tags/$tag:refs/tags/$tag"
            [[ "$(git rev-parse "refs/tags/$tag^{commit}")" == "$(git rev-parse "$EVENT_SHA^{commit}")" ]] || {
              printf 'tag %s does not resolve to the triggering commit\n' "$tag" >&2
              exit 1
            }
          fi

          printf 'ref=refs/tags/%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\nversion=%s\n' "$tag" "${tag#v}" >> "$GITHUB_OUTPUT"

  quality:
    name: Test and lint
    runs-on: ubuntu-latest
    needs:
      - validate-release
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ needs.validate-release.outputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

      - name: Set up golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          version: v2.9.0

      - name: Run lint
        run: make lint

      - name: Check package-manager scripts and workflows
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck scripts/install.sh scripts/install_test.sh scripts/release_smoke.sh \
            scripts/release_publish_preflight.sh scripts/release_publish_preflight_test.sh \
            scripts/release_workflow_test.sh scripts/package_manager_smoke.sh scripts/package_manager_smoke_test.sh
          scripts/install_test.sh
          scripts/release_publish_preflight_test.sh
          scripts/release_workflow_test.sh
          scripts/package_manager_smoke_test.sh
          pwsh ./scripts/windows_msi_contract_test.ps1
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 \
            .github/workflows/ci.yml .github/workflows/release.yml \
            .github/workflows/winget.yml .github/workflows/package-manager-smoke.yml

  release-dry-run:
    name: GoReleaser snapshot dry-run
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - quality
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release snapshot
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean

  create-draft:
    name: Create draft GitHub release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - validate-release
      - quality
    permissions:
      contents: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ needs.validate-release.outputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Preflight Homebrew cask publication
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: scripts/release_publish_preflight.sh

      - name: Reject published release reruns
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          set -euo pipefail
          if is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
            [ "$is_draft" = true ] || {
              printf 'refusing to replace assets on published release %s\n' "$RELEASE_TAG" >&2
              exit 1
            }
            printf 'replacing deterministic assets on existing draft %s\n' "$RELEASE_TAG"
          fi

      - name: Run GoReleaser to draft release
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save generated Homebrew cask until finalization
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ajq-homebrew-cask
          path: dist/homebrew/Casks/ajq.rb
          if-no-files-found: error

  release-windows-msi:
    name: Build Windows x64 MSI
    if: github.event_name == 'push'
    runs-on: windows-latest
    needs:
      - validate-release
      - create-draft
    permissions:
      contents: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ needs.validate-release.outputs.ref }}

      - name: Resolve deterministic MSI contract
        id: contract
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          & ./scripts/windows_msi_contract.ps1 -Tag $env:RELEASE_TAG -OutputPath $env:GITHUB_OUTPUT

      - name: Download and verify x64 release ZIP from draft
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
          ZIP_ASSET: ${{ steps.contract.outputs.zip_asset }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path stage | Out-Null
          $isDraft = (gh release view $env:RELEASE_TAG --json isDraft --jq '.isDraft').Trim()
          if ($isDraft -ne 'true') { throw 'MSI packaging requires GoReleaser to leave the release as a draft' }
          gh release download $env:RELEASE_TAG --pattern $env:ZIP_ASSET --dir stage
          $zip = Join-Path stage $env:ZIP_ASSET
          if (-not (Test-Path -LiteralPath $zip -PathType Leaf)) { throw "draft release did not contain $env:ZIP_ASSET" }
          Expand-Archive -LiteralPath $zip -DestinationPath stage/extracted -Force
          $root = (Resolve-Path stage/extracted).Path
          $binary = Join-Path $root 'ajq.exe'
          $license = Join-Path $root 'LICENSE'
          $allBinaries = @(Get-ChildItem -LiteralPath $root -Recurse -File -Filter 'ajq.exe')
          if ($allBinaries.Count -ne 1 -or -not (Test-Path -LiteralPath $binary -PathType Leaf)) { throw 'release ZIP must contain exactly one root ajq.exe' }
          if (-not (Test-Path -LiteralPath $license -PathType Leaf)) { throw 'release ZIP must contain root LICENSE' }
          "binary=$binary" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "license=$license" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install pinned WiX v4
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix --version

      - name: Build MSI only from verified release files
        shell: pwsh
        env:
          MSI_VERSION: ${{ steps.contract.outputs.version }}
          PRODUCT_CODE: ${{ steps.contract.outputs.product_code }}
          MSI_ASSET: ${{ steps.contract.outputs.msi_asset }}
          BINARY_SOURCE: ${{ steps.contract.outputs.binary }}
          LICENSE_SOURCE: ${{ steps.contract.outputs.license }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          wix build build/windows/ajq.wxs -arch x64 `
            -d "Version=$env:MSI_VERSION" `
            -d "ProductCode=$env:PRODUCT_CODE" `
            -d "BinarySource=$env:BINARY_SOURCE" `
            -d "LicenseSource=$env:LICENSE_SOURCE" `
            -o "dist/$env:MSI_ASSET"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-Item "dist/$env:MSI_ASSET"

      - name: Check optional Azure Trusted Signing credentials
        id: signing
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          TRUSTED_SIGNING_ENDPOINT: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          TRUSTED_SIGNING_ACCOUNT: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          TRUSTED_SIGNING_PROFILE: ${{ secrets.TRUSTED_SIGNING_PROFILE }}
        run: |
          $required = @(
            $env:AZURE_TENANT_ID, $env:AZURE_CLIENT_ID, $env:AZURE_CLIENT_SECRET,
            $env:TRUSTED_SIGNING_ENDPOINT, $env:TRUSTED_SIGNING_ACCOUNT, $env:TRUSTED_SIGNING_PROFILE
          )
          $enabled = if (@($required | Where-Object { [string]::IsNullOrWhiteSpace($_) }).Count -eq 0) { 'true' } else { 'false' }
          "enabled=$enabled" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          if ($enabled -eq 'false') {
            Write-Warning 'Trusted Signing credentials are incomplete; producing an UNSIGNED MSI.'
          }

      - name: Sign MSI with Azure Trusted Signing
        if: steps.signing.outputs.enabled == 'true'
        uses: azure/trusted-signing-action@208f8af4bf26cf2af8597424e3cb5582801523ba # v2.0.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.TRUSTED_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\dist
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload MSI to draft release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
          MSI_ASSET: ${{ steps.contract.outputs.msi_asset }}
        run: |
          gh release upload $env:RELEASE_TAG "dist/$env:MSI_ASSET" --clobber

  finalize-release:
    name: Finalize checksums, attest, and publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - validate-release
      - create-draft
      - release-windows-msi
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download all promoted draft assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$RELEASE_TAG" --dir dist \
            --pattern 'ajq_*.tar.gz' \
            --pattern 'ajq_*.zip' \
            --pattern 'ajq_*.msi'
          test -n "$(find dist -maxdepth 1 -name 'ajq_*.msi' -print -quit)"

      - name: Regenerate final checksums including MSI
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          find . -maxdepth 1 -type f -name 'ajq_*' -printf '%f\n' | LC_ALL=C sort | xargs sha256sum > checksums.txt
          grep -Eq ' ajq_.*_Windows_x86_64\.msi$' checksums.txt

      - name: Replace draft checksum asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: gh release upload "$RELEASE_TAG" dist/checksums.txt --clobber

      - name: Attest final release provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.msi
            dist/checksums.txt

      - name: Publish complete draft release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: gh release edit "$RELEASE_TAG" --draft=false

  publish-homebrew-cask:
    name: Publish Homebrew cask after release finalization
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - validate-release
      - finalize-release
    steps:
      - name: Restore generated Homebrew cask
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ajq-homebrew-cask
          path: cask

      - name: Publish saved cask to the tap
        shell: bash
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          set -euo pipefail
          scripts/release_publish_preflight.sh
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/ricardocabral/homebrew-tap.git" tap
          install -m 0644 cask/ajq.rb tap/Casks/ajq.rb
          git -C tap config user.name github-actions[bot]
          git -C tap config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git -C tap diff --quiet -- Casks/ajq.rb || {
            git -C tap add Casks/ajq.rb
            git -C tap commit -m "Homebrew cask update for ajq ${RELEASE_TAG}"
            git -C tap push
          }
