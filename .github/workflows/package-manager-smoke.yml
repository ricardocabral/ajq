---
name: Package-manager smoke

"on":
  workflow_dispatch:
    inputs:
      tag:
        description: Existing released vX.Y.Z tag to install
        required: true
        type: string
      channel:
        description: Package channel to clean-install
        required: true
        type: choice
        options:
          - homebrew
          - winget

permissions:
  contents: read

jobs:
  validate:
    name: Validate smoke release identity
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - id: tag
        env:
          TAG: ${{ inputs.tag }}
          CHANNEL: ${{ inputs.channel }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { printf 'tag must be vX.Y.Z, got %s\n' "$TAG" >&2; exit 1; }
          [[ "$CHANNEL" == homebrew || "$CHANNEL" == winget ]] || { printf 'unsupported channel: %s\n' "$CHANNEL" >&2; exit 1; }
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null || { printf 'release does not exist: %s\n' "$TAG" >&2; exit 1; }
          if [[ "$CHANNEL" == winget ]]; then
            expected="ajq_${TAG#v}_Windows_x86_64.msi"
            mapfile -t msi_assets < <(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name | select(. == "'"$expected"'")')
            [[ "${#msi_assets[@]}" -eq 1 ]] || { printf 'winget smoke requires exactly one canonical MSI asset: %s\n' "$expected" >&2; exit 1; }
          fi
          printf 'tag=%s\nversion=%s\n' "$TAG" "${TAG#v}" >> "$GITHUB_OUTPUT"

  homebrew:
    name: Homebrew clean install
    if: inputs.channel == 'homebrew'
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - run: scripts/package_manager_smoke.sh --channel homebrew --tag ${{ needs.validate.outputs.tag }}

  winget:
    name: WinGet clean install
    if: inputs.channel == 'winget'
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - shell: pwsh
        run: ./scripts/package_manager_smoke.ps1 -Channel winget -Tag '${{ needs.validate.outputs.tag }}'
