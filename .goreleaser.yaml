---
version: 2

project_name: ajq

before:
  hooks:
    - go mod download

builds:
  - id: ajq
    main: ./cmd/ajq
    binary: ajq
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - >-
        -s -w
        -X {{ .ModulePath }}/internal/version.Version={{ .Version }}

archives:
  - id: ajq
    ids:
      - ajq
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"


homebrew_casks:
  - name: ajq
    ids:
      - ajq
    binaries:
      - ajq
    repository:
      owner: ricardocabral
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    # The release workflow enables uploads only after its credential preflight.
    # Snapshot/PR builds do not set this marker and remain secret-free.
    skip_upload: '{{ if eq (index .Env "HOMEBREW_CASK_UPLOAD") "1" }}false{{ else }}true{{ end }}'
    homepage: https://github.com/ricardocabral/ajq
    description: semantic jq for fuzzy JSON filtering and bounded classification
    url:
      verified: github.com/ricardocabral/ajq
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/ajq"]
          end
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    commit_msg_template: Homebrew cask update for {{ .ProjectName }} {{ .Tag }}

release:
  github:
    owner: ricardocabral
    name: ajq
  # Finalize the draft only after the Windows MSI and replacement checksums exist.
  draft: true
  prerelease: auto
  # Draft retries replace only deterministic assets; workflow rejects published releases first.
  replace_existing_artifacts: true
  mode: replace
  header: |
    ## ajq {{ .Tag }}

    Install a prebuilt binary from the assets below. Homebrew cask packaging and the
    checksum-verifying install script are generated by the release pipeline.

    Releases published after provenance attestations are enabled can be verified
    with the GitHub CLI:

    ```bash
    gh attestation verify <downloaded-archive-or-checksums.txt> --repo ricardocabral/ajq
    ```

    Checksum verification and provenance verification are separate steps; compare
    archive SHA-256 digests with `checksums.txt` in addition to any attestation
    verification you perform.
